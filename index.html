<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Lanchonete Central — Painel de Caixa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Chart.js é carregado dinamicamente pelo próprio script, com espera garantida (ver ensureChartLib) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg: #F4F5F2;
    --surface: #FFFFFF;
    --surface-2: #F8F9F6;
    --border: #E6E8E2;
    --border-strong: #D8DBD3;
    --ink: #1D2420;
    --ink-soft: #545E56;
    --muted: #8B948B;

    --brand: #E8A33D;
    --brand-dark: #C67F1E;
    --brand-soft: #FBEDD3;

    --green: #2E8F5B;
    --green-soft: #E2F3E9;
    --red: #D6483D;
    --red-soft: #FBE5E2;
    --blue: #3B7DB8;
    --blue-soft: #E4EFF8;
    --purple: #7C6FD1;
    --purple-soft: #ECE9FB;
    --teal: #2E9C96;
    --teal-soft: #DEF3F1;

    --side-bg: #16231D;
    --side-bg-active: #1F3128;
    --side-border: #253A30;
    --side-text: #A9B8AE;
    --side-text-active: #FFFFFF;

    --r-sm: 8px;
    --r: 12px;
    --r-lg: 18px;
    --shadow-sm: 0 1px 2px rgba(20,30,20,.05), 0 1px 1px rgba(20,30,20,.03);
    --shadow: 0 6px 20px rgba(20,30,20,.08);
    --shadow-lg: 0 20px 45px rgba(20,30,20,.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'Space Mono',monospace; font-variant-numeric:tabular-nums;}
  .display{font-family:'Anton',Impact,'Inter',sans-serif; font-weight:400;}
  .num-cell{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:6px;}
  ::-webkit-scrollbar-thumb:hover{background:#B9BEB2;}

  svg.icon{ width:18px; height:18px; flex-shrink:0; }
  svg.icon path, svg.icon circle, svg.icon line, svg.icon rect, svg.icon polyline{
    stroke:currentColor; stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round;
  }

  /* ================= LOGIN / SETUP ================= */
  #authScreen{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 20%, rgba(232,163,61,.10), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(46,143,91,.12), transparent 45%),
      var(--side-bg);
    z-index:100; padding:20px;
  }
  .ticket{
    background:var(--surface);
    width:100%; max-width:400px;
    border-radius:var(--r-lg);
    box-shadow:var(--shadow-lg);
    padding:38px 34px 30px;
  }
  .ticket-brand{ text-align:center; margin-bottom:4px; }
  .ticket-logo{
    width:52px; height:52px; border-radius:14px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, var(--brand), var(--brand-dark)); box-shadow:var(--shadow);
  }
  .ticket-logo svg{ width:26px; height:26px; }
  .ticket-logo svg path{ stroke:#fff; }
  .ticket-brand .eyebrow{
    display:block; font-size:11px; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; font-weight:700;
  }
  .ticket-brand h1{
    font-family:'Anton',Impact,sans-serif; font-size:26px; margin:0; color:var(--ink); line-height:1.1; font-weight:400; letter-spacing:.3px;
  }
  .ticket-brand .sub{ font-size:13px; color:var(--muted); margin-top:8px; }
  .ticket-divider{ border:none; border-top:1px solid var(--border); margin:24px 0 20px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; color:var(--ink-soft); margin-bottom:7px; font-weight:600; }
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border:1.5px solid var(--border-strong); border-radius:var(--r-sm);
    background:var(--surface); font-family:'Inter',sans-serif; font-size:14px; color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft);
  }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    padding:11px 18px; border-radius:var(--r-sm); border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px;
    transition:transform .1s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--brand); color:#2A1B00; box-shadow:0 2px 8px rgba(232,163,61,.35); }
  .btn-primary:hover{ background:var(--brand-dark); }
  .btn-block{ width:100%; }
  .btn-outline{ background:var(--surface); border:1.5px solid var(--border-strong); color:var(--ink); }
  .btn-outline:hover{ border-color:var(--ink-soft); background:var(--surface-2); }
  .btn-danger{ background:var(--red); color:#fff; }
  .btn-danger:hover{ background:#B93B31; }
  .btn-ghost{ background:transparent; color:var(--ink-soft); padding:8px 10px; font-weight:600; }
  .btn-ghost:hover{ color:var(--ink); background:var(--surface-2); }
  .btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:8px; }
  .btn svg.icon{ width:15px; height:15px; }
  .auth-error{ color:var(--red); font-size:12.5px; margin-top:8px; display:none; font-weight:600; }
  .auth-note{ font-size:11.5px; color:var(--muted); margin-top:18px; line-height:1.55; text-align:center; }

  /* ================= APP SHELL ================= */
  #app{ display:none; min-height:100vh; }
  .shell{ display:flex; min-height:100vh; }

  .sidebar{
    width:236px; flex-shrink:0; background:var(--side-bg);
    display:flex; flex-direction:column; padding:20px 14px;
    position:sticky; top:0; height:100vh;
  }
  .sidebar .brand{ padding:6px 10px 20px; margin-bottom:10px; display:flex; align-items:center; gap:11px; }
  .sidebar .brand .logo-badge{
    width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--brand), var(--brand-dark));
    display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .sidebar .brand .logo-badge svg{ width:19px; height:19px; }
  .sidebar .brand .logo-badge svg path{ stroke:#2A1B00; }
  .sidebar .brand-text .eyebrow{ color:var(--brand); font-size:9.5px; letter-spacing:2px; text-transform:uppercase; font-weight:800; display:block; }
  .sidebar .brand-text h1{ font-family:'Inter',sans-serif; font-weight:800; color:#fff; font-size:15px; margin:2px 0 0; line-height:1.15; }

  .navlist{ list-style:none; padding:0; margin:0; flex:1; display:flex; flex-direction:column; gap:2px; }
  .navlist li{ list-style:none; }
  .navlist button{
    width:100%; text-align:left; background:none; border:none; color:var(--side-text); cursor:pointer;
    padding:10px 12px; border-radius:10px; font-size:13.5px; font-weight:600; font-family:'Inter',sans-serif;
    display:flex; align-items:center; gap:11px; position:relative; transition:background .15s ease, color .15s ease;
  }
  .navlist button:hover{ background:rgba(255,255,255,.06); color:#fff; }
  .navlist button.active{ background:var(--side-bg-active); color:var(--side-text-active); }
  .navlist button.active svg.icon path{ stroke:var(--brand); }
  .navlist button svg.icon{ width:18px; height:18px; }

  .sidebar-footer{ padding-top:14px; border-top:1px solid var(--side-border); margin-top:10px; }
  .sidebar-footer .who{ font-size:11.5px; color:#7E9188; margin-bottom:8px; display:flex; align-items:center; gap:6px; padding:0 10px;}
  .sidebar-footer button{ width:100%; justify-content:flex-start; padding-left:10px; }

  .main{ flex:1; min-width:0; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 32px; background:var(--bg);
    position:sticky; top:0; z-index:5;
  }
  .topbar h2{ font-family:'Inter',sans-serif; font-weight:800; font-size:21px; margin:0; color:var(--ink); letter-spacing:-.2px; }
  .topbar .today{ font-size:12.5px; color:var(--muted); margin-top:3px; text-transform:capitalize; }
  .content{ padding:0 32px 60px; }
  .actions{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  /* ---------- Cards / grids ---------- */
  .grid{ display:grid; gap:16px; }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media(max-width:1000px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(1,1fr);} .grid-2{grid-template-columns:repeat(1,1fr);} }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:20px 20px; position:relative; box-shadow:var(--shadow-sm);
    transition:box-shadow .15s ease, transform .15s ease;
  }
  .card:hover{ box-shadow:var(--shadow); }
  .card-icon{
    width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:14px;
  }
  .card-icon svg{ width:19px; height:19px; }
  .icon-mustard{ background:var(--brand-soft); } .icon-mustard svg path{ stroke:var(--brand-dark); }
  .icon-blue{ background:var(--blue-soft); } .icon-blue svg path{ stroke:var(--blue); }
  .icon-green{ background:var(--green-soft); } .icon-green svg path{ stroke:var(--green); }
  .icon-purple{ background:var(--purple-soft); } .icon-purple svg path{ stroke:var(--purple); }
  .icon-red{ background:var(--red-soft); } .icon-red svg path{ stroke:var(--red); }
  .icon-teal{ background:var(--teal-soft); } .icon-teal svg path{ stroke:var(--teal); }

  .card.tone-total{ background:var(--ink); border:none; }
  .card.tone-total .stat-label{ color:#A9B3AC; }
  .card.tone-total .stat-value{ color:#fff; }
  .card.tone-total .card-icon{ background:rgba(255,255,255,.12); }
  .card.tone-total .card-icon svg path{ stroke:var(--brand); }

  .stat-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:700; }
  .stat-value{ font-family:'Space Mono',monospace; font-size:24px; font-weight:700; margin-top:8px; color:var(--ink); letter-spacing:-.5px; }
  .stat-sub{ font-size:12px; color:var(--muted); margin-top:6px; }

  .hero-card{
    background:linear-gradient(135deg, #1D2A22, #16231D);
    border-radius:var(--r-lg); padding:28px 30px; color:#fff; box-shadow:var(--shadow-lg); position:relative; overflow:hidden;
    margin-bottom:20px;
  }
  .hero-card::after{
    content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,163,61,.25), transparent 70%);
  }
  .hero-card .stat-label{ color:#9FB0A4; }
  .hero-card .stat-value{ font-size:40px; color:#fff; margin-top:10px; }
  .hero-card .stat-sub{ color:#8FA097; }

  .panel{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:22px; margin-bottom:20px; box-shadow:var(--shadow-sm);
  }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:10px; flex-wrap:wrap; }
  .panel-head h3{ font-family:'Inter',sans-serif; font-size:15.5px; margin:0; color:var(--ink); font-weight:700; letter-spacing:-.1px; }
  .panel-head .actions{ display:flex; gap:8px; flex-wrap:wrap; }

  /* Receipt-style leader rows (kept as a light signature touch) */
  .ticket-line{ display:flex; align-items:baseline; gap:8px; padding:8px 0; }
  .ticket-line .lbl{ font-size:13.5px; color:var(--ink-soft); white-space:nowrap; }
  .ticket-line .dots{ flex:1; border-bottom:1.5px dotted var(--border-strong); margin-bottom:4px; }
  .ticket-line .val{ font-family:'Space Mono',monospace; font-size:13.5px; font-weight:700; white-space:nowrap; }
  .val.pos{ color:var(--green); }
  .val.neg{ color:var(--red); }
  .ticket-total{ border-top:1.5px solid var(--border-strong); margin-top:8px; padding-top:12px; }
  .ticket-total .lbl{ font-weight:800; color:var(--ink); }
  .ticket-total .val{ font-size:16px; }

  /* Tables */
  table.data{ width:100%; border-collapse:collapse; font-size:13px; }
  table.data th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    border-bottom:1.5px solid var(--border); padding:9px 10px; font-weight:700; background:var(--surface-2);
    position:sticky; top:0;
  }
  table.data th:first-child{ border-top-left-radius:8px; }
  table.data th:last-child{ border-top-right-radius:8px; }
  table.data td{ padding:10px 10px; border-bottom:1px solid var(--border); color:var(--ink); }
  table.data tbody tr{ transition:background .1s ease; }
  table.data tbody tr:hover{ background:var(--surface-2); }
  table.data td.num{ font-family:'Inter',sans-serif; font-variant-numeric:tabular-nums; text-align:right; font-weight:600; }
  .table-wrap{ overflow-x:auto; border-radius:8px; }

  .badge{
    display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:700;
  }
  .badge-ok{ background:var(--green-soft); color:var(--green); }
  .badge-wait{ background:var(--brand-soft); color:var(--brand-dark); }
  .badge-parc{ background:var(--blue-soft); color:var(--blue); }

  .stamp{
    display:inline-flex; align-items:center; border-radius:6px; padding:3px 9px; font-size:10px; font-weight:800;
    text-transform:uppercase; letter-spacing:.4px;
  }
  .stamp.ok{ color:var(--green); background:var(--green-soft); }
  .stamp.wait{ color:var(--brand-dark); background:var(--brand-soft); }
  .stamp.parc{ color:var(--blue); background:var(--blue-soft); }

  .pill-conta{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; padding:4px 10px 4px 6px; border-radius:20px; }
  .pill-conta .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .tabs-sub{ display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .tabs-sub button{
    background:none; border:none; cursor:pointer; padding:10px 16px; font-weight:700; font-size:13px;
    color:var(--muted); border-bottom:2.5px solid transparent; margin-bottom:-1px; font-family:'Inter',sans-serif;
    transition:color .15s ease;
  }
  .tabs-sub button.active{ color:var(--ink); border-bottom-color:var(--brand); }
  .tabs-sub button:hover{ color:var(--ink); }

  .form-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px 16px; }
  @media(max-width:900px){ .form-grid{ grid-template-columns:repeat(2,1fr);} }
  @media(max-width:600px){ .form-grid{ grid-template-columns:1fr;} }
  .form-grid .field{ margin-bottom:0; }
  .field.span-2{ grid-column:span 2; }
  .field.span-3{ grid-column:span 3; }
  @media(max-width:900px){ .field.span-3{ grid-column:span 2;} }
  @media(max-width:600px){ .field.span-2, .field.span-3{ grid-column:span 1;} }

  .empty-state{ text-align:center; padding:44px 20px; color:var(--muted); }
  .empty-state .ico{ margin-bottom:10px; display:flex; align-items:center; justify-content:center; }
  .empty-state .ico svg{ width:32px; height:32px; opacity:.5; }

  .chip{
    display:inline-flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:20px; padding:6px 8px 6px 13px; font-size:12.5px; font-weight:600; color:var(--ink-soft);
  }
  .chip button{ background:var(--surface); border:1px solid var(--border); border-radius:50%; width:18px; height:18px; cursor:pointer; color:var(--red); font-weight:800; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center; padding:0;}

  .color-swatch{ width:16px; height:16px; border-radius:5px; display:inline-block; border:1px solid rgba(0,0,0,.08); vertical-align:-3px; margin-right:6px; }
  .color-dot-picker{ display:flex; gap:8px; flex-wrap:wrap; }
  .color-dot-picker label{ cursor:pointer; }
  .color-dot-picker input{ display:none; }
  .color-dot-picker .swatch-btn{
    width:28px; height:28px; border-radius:9px; display:block; border:2px solid transparent; cursor:pointer; transition:border-color .15s ease, transform .1s ease;
  }
  .color-dot-picker input:checked + .swatch-btn{ border-color:var(--ink); transform:scale(1.08); }

  /* Toasts */
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:14px 20px;
    border-radius:var(--r-sm); font-size:13.5px; font-weight:600; box-shadow:var(--shadow-lg); z-index:200;
    opacity:0; transform:translateY(12px); transition:all .25s ease; pointer-events:none;
    display:flex; align-items:center; gap:10px; max-width:360px;
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast.success{ background:#1E3A2A; }
  .toast .toast-ico{
    width:22px; height:22px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .toast .toast-ico svg{ width:13px; height:13px; }
  .toast .toast-ico svg path{ stroke:#fff; stroke-width:3; }
  .toast.plain .toast-ico{ display:none; }

  .mini-note{ font-size:11.5px; color:var(--muted); margin-top:10px; line-height:1.55; }

  .chart-box{ position:relative; height:290px; }
  .chart-box.small{ height:230px; }
  .chart-box.tall{ height:360px; }

  .filter-bar{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:4px; }
  .filter-bar .field{ margin-bottom:0; min-width:150px; }
  .search-row{ display:flex; gap:10px; margin-top:14px; }
  .search-row input{ flex:1; }
  .search-wrap{ position:relative; flex:1; }
  .search-wrap svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted); }
  .search-wrap svg path{ stroke:var(--muted); }
  .search-wrap input{ padding-left:36px !important; }

  .modal-bg{
    position:fixed; inset:0; background:rgba(15,20,15,.55); display:none; align-items:center; justify-content:center; z-index:150; padding:20px;
    backdrop-filter:blur(2px);
  }
  .modal-bg.show{ display:flex; }
  .modal{ background:var(--surface); border-radius:var(--r-lg); max-width:420px; width:100%; padding:26px; box-shadow:var(--shadow-lg); }
  .modal h3{ font-family:'Inter',sans-serif; font-weight:800; margin:0 0 8px; font-size:17px; }
  .modal p{ font-size:13.5px; color:var(--ink-soft); line-height:1.55; }
  .modal .modal-actions{ display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

  @media print{
    .sidebar, .topbar .actions, #authScreen, .no-print{ display:none !important; }
    body{ background:#fff; }
  }

  @media(max-width:800px){
    .shell{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; align-items:center; padding:10px 12px; overflow-x:auto; position:sticky; top:0; height:auto; z-index:20; }
    .sidebar .brand{ display:none; }
    .navlist{ flex-direction:row; flex:none; gap:4px; }
    .navlist button span.lbl{ display:none; }
    .navlist button{ padding:10px; }
    .sidebar-footer{ display:none; }
    .content{ padding:0 16px 50px; }
    .topbar{ padding:16px; }
    .hero-card .stat-value{ font-size:30px; }
  }
</style>
</head>
<body>

<!-- ================= AUTH SCREEN ================= -->
<div id="authScreen">
  <div class="ticket" id="ticketBox">
    <!-- filled by JS: setup or login -->
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="shell">
    <nav class="sidebar">
      <div class="brand">
        <div class="logo-badge">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 8h16l-1.5 10a2 2 0 0 1-2 1.8H7.5a2 2 0 0 1-2-1.8L4 8Z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
        </div>
        <div class="brand-text">
          <span class="eyebrow">Painel de Caixa</span>
          <h1>Lanchonete Central</h1>
        </div>
      </div>
      <ul class="navlist" id="navlist">
        <li><button data-view="dashboard" class="active">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M11 20V4"/><path d="M18 20v-7"/></svg>
          <span class="lbl">Fluxo Anual</span>

const valueLabelsPlugin = {
  id: 'valueLabelsPlugin',
  afterDatasetsDraw(chart){
    const opts = chart.options && chart.options.plugins && chart.options.plugins.valueLabelsPlugin;
    if(!opts || !opts.enabled) return;
    const ctx = chart.ctx;
    chart.data.datasets.forEach((dataset, dsIndex)=>{
      const meta = chart.getDatasetMeta(dsIndex);
      if(meta.hidden) return;
      meta.data.forEach((element, index)=>{
        const value = dataset.data[index];
        if(value===undefined || value===null || value===0) return;
        const label = 'R$ ' + Number(value).toLocaleString('pt-BR', {maximumFractionDigits:0});
        ctx.save();
        ctx.font = "700 11px 'Space Mono', monospace";
        ctx.fillStyle = '#1D2420';
        try{
          const pos = element.tooltipPosition ? element.tooltipPosition() : {x:element.x, y:element.y};
          if(chart.options.indexAxis === 'y'){
            ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(label, pos.x + 6, pos.y);

          }

      });
    });
  }
};

let _valueLabelsRegistered = false;

/* ---------- Carregamento robusto do Chart.js ----------
   Em vez de depender de uma <script src> estática no <head> (que pode
   perder a corrida contra o código inline em alguns ambientes/sandboxes),
   carregamos a biblioteca sob demanda e SEMPRE esperamos ela confirmar
   que terminou de carregar antes de criar qualquer gráfico. */
let _chartLibPromise = null;
function ensureChartLib(){
  if(typeof Chart !== 'undefined'){
    registerValueLabelsPlugin();
    return Promise.resolve();
  }
  if(_chartLibPromise) return _chartLibPromise;
  _chartLibPromise = new Promise((resolve, reject)=>{
    const existing = document.querySelector('script[data-chartjs-lib]');
    if(existing){
      existing.addEventListener('load', ()=>{ registerValueLabelsPlugin(); resolve(); });
      existing.addEventListener('error', ()=> reject(new Error('Falha ao carregar a biblioteca de gráficos (Chart.js).')));
      return;
    }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js';
    s.crossOrigin = 'anonymous';
    s.setAttribute('data-chartjs-lib', '1');
    s.onload = ()=>{ registerValueLabelsPlugin(); resolve(); };
    s.onerror = ()=> reject(new Error('Falha ao carregar a biblioteca de gráficos (Chart.js).'));
    document.head.appendChild(s);
  });
  return _chartLibPromise;
}

async function getCurrentUserId(){

async function storeGet(key){
  try{
    if(!sb) return null;
    const userId = await getCurrentUserId();
    if(!userId) return null;
    const { data, error } = await sb.from('kv_store').select('value').eq('user_id', userId).eq('key', key).maybeSingle();
    if(error){ console.error('storeGet falhou:', key, error); return null; }
    return data ? data.value : null;
  } catch(e){ console.error('storeGet exceção:', key, e); return null; }
}

async function storeSet(key, value){
  try{
    if(!sb) return false;
    const userId = await getCurrentUserId();
    if(!userId) return false;
    const { error } = await sb.from('kv_store').upsert({ user_id:userId, key, value, updated_at:new Date().toISOString() });
    if(error){ console.error('storeSet falhou:', key, error); return false; }
    return true;
  } catch(e){ console.error('storeSet exceção:', key, e); return false; }
}

      modal.classList.remove('show');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      resolve(v);
    }
    function onOk(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
  });
}

async function loadAllData(){
  const [entries, fornecedores, clientes, formas, categorias, contas] = await Promise.all([
    storeGet('lc_entries'), storeGet('lc_fornecedores'), storeGet('lc_clientes'),
    storeGet('lc_formas'), storeGet('lc_categorias'), storeGet('lc_contas')
  ]);

  state.entries = entries ? JSON.parse(entries) : SEED_ENTRIES.slice();
  state.fornecedores = fornecedores ? JSON.parse(fornecedores) : SEED_FORNECEDORES.slice();
  state.clientes = clientes ? JSON.parse(clientes) : SEED_CLIENTES.slice();
  state.formas = formas ? JSON.parse(formas) : SEED_FORMAS.slice();
  state.categorias = categorias ? JSON.parse(categorias) : { entradas: SEED_ENTRADAS_CAT.slice(), saidas: SEED_SAIDAS_CAT.slice() };
  state.contas = contas ? JSON.parse(contas) : SEED_CONTAS.slice();

  // Persist seed on first run so future edits have something to save against
  if(!entries) await storeSet('lc_entries', JSON.stringify(state.entries));
  if(!fornecedores) await storeSet('lc_fornecedores', JSON.stringify(state.fornecedores));
  if(!clientes) await storeSet('lc_clientes', JSON.stringify(state.clientes));
  if(!formas) await storeSet('lc_formas', JSON.stringify(state.formas));
  if(!categorias) await storeSet('lc_categorias', JSON.stringify(state.categorias));
  if(!contas) await storeSet('lc_contas', JSON.stringify(state.contas));
}

    if(periodo==='mes') state.relMes = Number(document.getElementById('relMes').value);
    renderRelPreview(periodo);
  };

  document.getElementById('relPeriodo').addEventListener('change', relatorioAtualizar);
  document.getElementById('relAno').addEventListener('change', relatorioAtualizar);
  document.getElementById('relMes').addEventListener('change', relatorioAtualizar);
  document.getElementById('relTipo').addEventListener('change', relatorioAtualizar);
  document.getElementById('btnExportCSV').addEventListener('click', exportarCSV);
  document.getElementById('btnPrint').addEventListener('click', ()=> window.print());

}

function getRelatorioEntries(periodo){
  const ano = state.relAno;
  const mes = state.relMes;
  const tipo = state.relTipo || 'todos';
  let list = state.entries.filter(e=> e.movimento!=='transferencia');
  list = list.filter(e=> entryYear(e)===ano);
  if(periodo==='mes') list = list.filter(e=> entryMonth(e)===mes);
  if(tipo!=='todos') list = list.filter(e=> e.movimento===tipo);
  list.sort((a,b)=> a.data.localeCompare(b.data));
  return list;
}

function renderRelPreview(periodo){
  const list = getRelatorioEntries(periodo || document.getElementById('relPeriodo').value);
  const totalEnt = list.filter(e=>e.movimento==='entrada').reduce((a,e)=>a+Number(e.valor||0),0);
  const totalSai = list.filter(e=>e.movimento==='saida').reduce((a,e)=>a+Number(e.valor||0),0);

  const rows = list.map(e=>`
    <tr>
      <td class="mono">${formatDateBR(e.data)}</td>
      <td>${e.movimento==='entrada'?'Entrada':'Saída'}</td>
      <td>${e.categoria}</td>
      <td>${e.descricao||''}</td>
      <td>${contaNome(e.conta)}</td>
      <td>${e.formaPagamento||''}</td>
      <td class="num">${formatBRL(e.valor)}</td>
    </tr>
  `).join('');

  document.getElementById('relPreview').innerHTML = `
    <table class="data">
      <thead><tr><th>Data</th><th>Mov.</th><th>Categoria</th><th>Descrição</th><th>Conta</th><th>Forma</th><th style="text-align:right;">Valor</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="7"><div class="empty-state">Nenhum lançamento no período selecionado</div></td></tr>`}</tbody>
      <tfoot>
        <tr style="background:var(--paper-2); font-weight:800;"><td colspan="6">Total Entradas</td><td class="num">${formatBRL(totalEnt)}</td></tr>
        <tr style="background:var(--paper-2); font-weight:800;"><td colspan="6">Total Saídas</td><td class="num">${formatBRL(totalSai)}</td></tr>
        <tr style="background:var(--ink); color:#fff; font-weight:800;"><td colspan="6">Saldo do Período</td><td class="num" style="color:#fff;">${formatBRL(totalEnt-totalSai)}</td></tr>
      </tfoot>
    </table>
  `;
}

function csvEscape(v){
  const s = String(v===undefined||v===null?'':v);
  if(/[",;\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

function exportarCSV(){
  const periodo = document.getElementById('relPeriodo').value;
  const list = getRelatorioEntries(periodo);
  const header = ['Data','Movimento','Categoria','Descricao','Conta','Forma de Pagamento','Status','Valor'];
  const lines = [header.join(';')];
  list.forEach(e=>{
    lines.push([
      formatDateBR(e.data), e.movimento==='entrada'?'Entrada':'Saida', e.categoria, e.descricao||'',
      contaNome(e.conta), e.formaPagamento||'', e.status||'', formatNum(e.valor)
    ].map(csvEscape).join(';'));
  });
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nomeArquivo = `lanchonete-central-relatorio-${state.relAno}${periodo==='mes'?'-'+String(state.relMes+1).padStart(2,'0'):''}.csv`;
  a.href = url; a.download = nomeArquivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toastSuccess('Relatório exportado com sucesso.');
}

          <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>

        </button>
        <button class="btn btn-outline btn-sm" id="btnLimparBusca">Limpar</button>
      </div>
    </div>

    <div class="panel" style="border:1.5px dashed var(--border-strong); background:var(--surface-2);">
      <div class="panel-head">

      <div class="filter-bar">
        <div class="field">
          <label>Mover para a conta</label>
          <select id="fBulkConta">

        </div>
        <button class="btn btn-primary btn-sm" id="btnAplicarLote">Aplicar aos lançamentos filtrados</button>

      <div class="panel-head">
        <h3>Lista de lançamentos</h3>
        <span class="mini-note" id="countInfo" style="margin:0;"></span>
      </div>
      <div class="table-wrap">
        <table class="data">
          <thead><tr>
            <th>Data</th><th>Movimento</th><th>Categoria</th><th>Descrição</th><th>Conta</th><th>Forma Pgto</th><th>Status</th><th style="text-align:right;">Valor</th><th></th>
          </tr></thead>
          <tbody id="tblLancBody"></tbody>

  `;
  document.getElementById('content').innerHTML = html;

  document.getElementById('btnNovoLanc').addEventListener('click', ()=> abrirFormLanc());
  document.getElementById('btnFecharForm').addEventListener('click', fecharFormLanc);
  document.getElementById('btnCancelarForm').addEventListener('click', fecharFormLanc);

  document.querySelectorAll('#movTabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#movTabs button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      montarCamposForm(btn.dataset.mov);
    });
  });

  // filtros
  const f = state.filtroLanc;
  document.getElementById('fPeriodo').value = f.periodo;
  document.getElementById('fMes').value = f.mes;
  document.getElementById('fDia').value = f.dia;
  document.getElementById('fMovimento').value = f.movimento;
  document.getElementById('fCategoriaFiltro').value = f.categoria || 'todos';
  document.getElementById('fFiltroConta').value = f.conta || 'todos';
  document.getElementById('fFornecedorFiltro').value = f.fornecedor || 'todos';
  document.getElementById('fBusca').value = f.busca || '';
  document.getElementById('fMesWrap').style.display = f.periodo==='mes' ? '' : 'none';
  document.getElementById('fDiaWrap').style.display = f.periodo==='dia' ? '' : 'none';

  document.getElementById('fPeriodo').addEventListener('change', e=>{
    f.periodo = e.target.value;
    document.getElementById('fMesWrap').style.display = f.periodo==='mes' ? '' : 'none';
    document.getElementById('fDiaWrap').style.display = f.periodo==='dia' ? '' : 'none';
    atualizarListaLanc();
  });
  document.getElementById('fMes').addEventListener('change', e=>{ f.mes = Number(e.target.value); atualizarListaLanc(); });
  document.getElementById('fDia').addEventListener('change', e=>{ f.dia = e.target.value; atualizarListaLanc(); });
  document.getElementById('fMovimento').addEventListener('change', e=>{ f.movimento = e.target.value; atualizarListaLanc(); });
  document.getElementById('fCategoriaFiltro').addEventListener('change', e=>{ f.categoria = e.target.value; atualizarListaLanc(); });
  document.getElementById('fFiltroConta').addEventListener('change', e=>{ f.conta = e.target.value; atualizarListaLanc(); });
  document.getElementById('fFornecedorFiltro').addEventListener('change', e=>{ f.fornecedor = e.target.value; atualizarListaLanc(); });
  document.getElementById('btnPesquisar').addEventListener('click', ()=>{
    f.busca = document.getElementById('fBusca').value.trim();
    atualizarListaLanc();
  });
  document.getElementById('fBusca').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); f.busca = e.target.value.trim(); atualizarListaLanc(); }
  });
  document.getElementById('btnLimparBusca').addEventListener('click', ()=>{
    f.busca = '';
    document.getElementById('fBusca').value = '';
    atualizarListaLanc();
  });
  document.getElementById('btnAplicarLote').addEventListener('click', aplicarCorrecaoContaLote);

  atualizarStatsLanc();
  atualizarListaLanc();
}

async function aplicarCorrecaoContaLote(){
  const novaConta = document.getElementById('fBulkConta').value;
  const alvo = state.__filtroLancResult || [];
  const alvoValido = alvo.filter(e=> e.movimento==='entrada' || e.movimento==='saida');
  if(alvoValido.length===0){ toast('Não há lançamentos na lista filtrada para corrigir.'); return; }
  const nomeConta = contaNome(novaConta);
  const ok = await confirmDialog(
    `Mover ${alvoValido.length} lançamento(s) para "${nomeConta}"?`,
    `Essa ação vai alterar a conta de todos os lançamentos que estão aparecendo na lista filtrada agora (entradas e saídas — transferências não são alteradas). Não pode ser desfeita automaticamente, mas você pode editar de volta a qualquer momento.`
  );
  if(!ok) return;
  const idsAlvo = new Set(alvoValido.map(e=>e.id));
  state.entries.forEach(e=>{ if(idsAlvo.has(e.id)) e.conta = novaConta; });
  await persistEntries();
  toastSuccess(`${alvoValido.length} lançamento(s) movido(s) para ${nomeConta} com sucesso!`);
  atualizarStatsLanc();
  atualizarListaLanc();
}

function atualizarStatsLanc(){
  const hoje = new Date().toISOString().slice(0,10);
  const now = new Date();
  const vendasHoje = state.entries.filter(e=>e.movimento==='entrada' && e.categoria && e.categoria.startsWith('Vendas') && e.data===hoje);
  const vendasMes = state.entries.filter(e=>e.movimento==='entrada' && e.categoria && e.categoria.startsWith('Vendas') && entryYear(e)===now.getFullYear() && entryMonth(e)===now.getMonth());
  document.getElementById('statVendasHoje').textContent = vendasHoje.length;
  document.getElementById('statVendasMes').textContent = vendasMes.length;
  document.getElementById('statFatHoje').textContent = formatBRL(vendasHoje.reduce((a,e)=>a+Number(e.valor||0),0));
  document.getElementById('statFatMes').textContent = formatBRL(vendasMes.reduce((a,e)=>a+Number(e.valor||0),0));
}

function atualizarListaLanc(){
  const f = state.filtroLanc;
  let list = state.entries.slice();

  if(f.periodo==='mes'){ list = list.filter(e=> entryMonth(e)===f.mes); }
  else if(f.periodo==='dia' && f.dia){ list = list.filter(e=> e.data===f.dia); }

  if(f.movimento && f.movimento!=='todos'){ list = list.filter(e=>e.movimento===f.movimento); }
  if(f.categoria && f.categoria!=='todos'){ list = list.filter(e=> e.categoria===f.categoria); }
  if(f.conta && f.conta!=='todos'){
    list = list.filter(e=> e.conta===f.conta || e.contaOrigem===f.conta || e.contaDestino===f.conta);
  }
  if(f.fornecedor && f.fornecedor!=='todos'){
    list = list.filter(e=> e.fornecedor===f.fornecedor);
  }
  if(f.busca){
    const termo = f.busca.toLowerCase();
    list = list.filter(e=>
      (e.descricao||'').toLowerCase().includes(termo) ||
      (e.categoria||'').toLowerCase().includes(termo) ||
      (e.fornecedor||'').toLowerCase().includes(termo) ||
      (e.cliente||'').toLowerCase().includes(termo) ||
      (e.formaPagamento||'').toLowerCase().includes(termo)
    );
  }

  list.sort((a,b)=> b.data.localeCompare(a.data));
  state.__filtroLancResult = list;

  document.getElementById('countInfo').textContent = `${list.length} lançamento(s)` + (f.busca ? ` para "${f.busca}"` : '');

  const rows = list.map(e=>{
    const isTransf = e.movimento==='transferencia';
    const movLabel = e.movimento==='entrada' ? '<span class="badge badge-ok">Entrada</span>' : e.movimento==='saida' ? '<span class="badge" style="background:var(--red-soft); color:var(--red);">Saída</span>' : '<span class="badge badge-parc">Transferência</span>';
    const contaLabel = isTransf ? `${contaNome(e.contaOrigem)} → ${contaNome(e.contaDestino)}` : contaPillHTML(e.conta);
    const statusStamp = e.status==='OK' ? '<span class="stamp ok">OK</span>' : e.status==='Aguardando' ? '<span class="stamp wait">Aguardando</span>' : e.status ? `<span class="stamp parc">${e.status}</span>` : '';
    const valClass = e.movimento==='entrada' ? 'pos' : e.movimento==='saida' ? 'neg' : '';
    return `<tr>
      <td class="mono">${formatDateBR(e.data)}</td>
      <td>${movLabel}</td>
      <td>${e.categoria||'—'}</td>
      <td>${e.descricao||''}${e.fornecedor?` <span class="mini-note" style="display:inline;">· ${e.fornecedor}</span>`:''}${e.cliente?` <span class="mini-note" style="display:inline;">· ${e.cliente}</span>`:''}</td>
      <td>${contaLabel}</td>
      <td>${e.formaPagamento||'—'}</td>
      <td>${statusStamp}</td>
      <td class="num val ${valClass}">${formatBRL(e.valor)}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-ghost btn-sm" data-edit="${e.id}" title="Editar">✎</button>
        <button class="btn btn-ghost btn-sm" data-del="${e.id}" title="Excluir" style="color:var(--red);">🗑</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tblLancBody').innerHTML = rows || `<tr><td colspan="9"><div class="empty-state"><div class="ico">🧾</div>Nenhum lançamento encontrado para esse filtro</div></td></tr>`;

  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=> abrirFormLanc(btn.dataset.edit));
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ok = await confirmDialog('Excluir lançamento?', 'Essa ação não pode ser desfeita.');
      if(!ok) return;
      state.entries = state.entries.filter(e=>e.id!==btn.dataset.del);
      await persistEntries();
      toast('Lançamento excluído.');
      atualizarStatsLanc();
      atualizarListaLanc();
      atualizarSaldoMiniIfExists();
    });
  });
}

function atualizarSaldoMiniIfExists(){ /* hook reservado para futuras atualizações reativas */ }

function abrirFormLanc(editId){
  const panel = document.getElementById('formPanel');
  panel.style.display='block';
  document.getElementById('editId').value = editId || '';
  let mov = 'entrada';
  if(editId){
    const e = state.entries.find(x=>x.id===editId);
    if(e) mov = e.movimento;
    document.getElementById('formTitle').textContent = 'Editar lançamento';
  } else {
    document.getElementById('formTitle').textContent = 'Novo lançamento';
  }
  document.querySelectorAll('#movTabs button').forEach(b=> b.classList.toggle('active', b.dataset.mov===mov));
  montarCamposForm(mov, editId);
  if(typeof panel.scrollIntoView === 'function'){
    try{ panel.scrollIntoView({behavior:'smooth', block:'start'}); }catch(e){}
  }
}
function fecharFormLanc(){
  document.getElementById('formPanel').style.display='none';
  document.getElementById('lancForm').reset();
}

function montarCamposForm(mov, editId){
  const wrap = document.getElementById('formFields');
  const e = editId ? state.entries.find(x=>x.id===editId) : null;
  const hoje = new Date().toISOString().slice(0,10);
  const cats = categoriasParaMovimento(mov);
  const formasOpts = state.formas.map(f=>`<option value="${f.nome}" ${e&&e.formaPagamento===f.nome?'selected':''}>${f.nome}</option>`).join('');
  const fornecedoresOpts = `<option value="">—</option>` + state.fornecedores.map(f=>`<option value="${f.nome}" ${e&&e.fornecedor===f.nome?'selected':''}>${f.nome}</option>`).join('');
  const clientesOpts = `<option value="">—</option>` + state.clientes.map(c=>`<option value="${c.nome}" ${e&&e.cliente===c.nome?'selected':''}>${c.nome}</option>`).join('');
  const contaOpts = (sel)=> state.contas.map(c=>`<option value="${c.id}" ${sel===c.id?'selected':''}>${c.nome}</option>`).join('');

  if(mov==='transferencia'){
    wrap.innerHTML = `
      <div class="field"><label>Data</label><input type="date" id="fData" value="${e?e.data:hoje}" required></div>
      <div class="field"><label>Conta de origem</label><select id="fContaOrigem">${contaOpts(e?e.contaOrigem:(state.contas[0]?state.contas[0].id:''))}</select></div>
      <div class="field"><label>Conta de destino</label><select id="fContaDestino">${contaOpts(e?e.contaDestino:(state.contas[1]?state.contas[1].id:(state.contas[0]?state.contas[0].id:'')))}</select></div>
      <div class="field span-2"><label>Descrição</label><input type="text" id="fDescricao" placeholder="Ex: Depósito do caixa no banco" value="${e?e.descricao||'':''}"></div>
      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" min="0" id="fValor" value="${e?e.valor:''}" required></div>
    `;
  } else {
    const isEntrada = mov==='entrada';
    wrap.innerHTML = `
      <div class="field"><label>Data</label><input type="date" id="fData" value="${e?e.data:hoje}" required></div>
      <div class="field"><label>Categoria</label><select id="fCategoria" required>${cats.map(c=>`<option value="${c}" ${e&&e.categoria===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" min="0" id="fValor" value="${e?e.valor:''}" required></div>
      <div class="field span-2"><label>Descrição</label><input type="text" id="fDescricao" placeholder="Detalhe do lançamento" value="${e?e.descricao||'':''}"></div>
      <div class="field"><label>Conta ${isEntrada?'de destino (onde entrou o dinheiro)':'de origem (de onde saiu)'}</label><select id="fConta">${contaOpts(e?e.conta:(state.contas[0]?state.contas[0].id:''))}</select></div>
      <div class="field"><label>Forma de pagamento</label><select id="fFormaPagamento">${formasOpts}</select></div>
      <div class="field"><label>Status</label>
        <select id="fStatus">
          <option value="OK" ${e&&e.status==='OK'?'selected':''}>OK</option>
          <option value="Aguardando" ${e&&e.status==='Aguardando'?'selected':''}>Aguardando</option>
          <option value="Parcelado" ${e&&e.status==='Parcelado'?'selected':''}>Parcelado</option>
        </select>
      </div>
      ${isEntrada ? `<div class="field span-2"><label>Cliente (opcional)</label><select id="fCliente">${clientesOpts}</select></div>`
                  : `<div class="field span-2"><label>Fornecedor (opcional)</label><select id="fFornecedor">${fornecedoresOpts}</select></div>`}
    `;
  }

  const form = document.getElementById('lancForm');
  form.onsubmit = async (ev)=>{
    ev.preventDefault();
    const id = document.getElementById('editId').value || uid();
    let novo;
    if(mov==='transferencia'){
      novo = {
        id, movimento:'transferencia',
        data: document.getElementById('fData').value,
        contaOrigem: document.getElementById('fContaOrigem').value,
        contaDestino: document.getElementById('fContaDestino').value,
        descricao: document.getElementById('fDescricao').value,
        valor: parseFloat(document.getElementById('fValor').value)||0,
      };
      if(novo.contaOrigem === novo.contaDestino){ toast('Escolha contas diferentes para a transferência.'); return; }
    } else {
      novo = {
        id, movimento: mov,
        data: document.getElementById('fData').value,
        categoria: document.getElementById('fCategoria').value,
        descricao: document.getElementById('fDescricao').value,
        valor: parseFloat(document.getElementById('fValor').value)||0,
        conta: document.getElementById('fConta').value,
        formaPagamento: document.getElementById('fFormaPagamento').value,
        status: document.getElementById('fStatus').value,
        fornecedor: mov==='saida' ? (document.getElementById('fFornecedor')?document.getElementById('fFornecedor').value:'') : '',
        cliente: mov==='entrada' ? (document.getElementById('fCliente')?document.getElementById('fCliente').value:'') : '',
      };
    }
    const idx = state.entries.findIndex(x=>x.id===id);
    if(idx>=0) state.entries[idx] = novo; else state.entries.push(novo);
    await persistEntries();
    toastSuccess(editId ? 'Lançamento atualizado com sucesso!' : 'Lançamento salvo com sucesso!');
    fecharFormLanc();
    atualizarStatsLanc();
    atualizarListaLanc();
  };
}

/* ================= VIEW: MENSAL ================= */
let chartMensal = null;

function renderMensal(){
  const anos = anosDisponiveis();
  const ano = state.mensalAno || Math.max(...anos);
  state.mensalAno = ano;
  const mes = state.mensalMes;

  document.getElementById('topbarActions').innerHTML = `
    <select id="selMensalAno" class="mono" style="padding:8px 12px; border-radius:3px; border:1.5px solid var(--paper-edge); font-weight:700; margin-right:8px;">
      ${anos.map(a=>`<option value="${a}" ${a===ano?'selected':''}>${a}</option>`).join('')}
    </select>
    <select id="selMensalMes" style="padding:8px 12px; border-radius:3px; border:1.5px solid var(--paper-edge); font-weight:700;">
      ${MESES.map((m,i)=>`<option value="${i}" ${i===mes?'selected':''}>${m}</option>`).join('')}
    </select>
  `;

  const entradasMes = state.entries.filter(e=> e.movimento==='entrada' && entryYear(e)===ano && entryMonth(e)===mes);
  const saidasMes = state.entries.filter(e=> e.movimento==='saida' && entryYear(e)===ano && entryMonth(e)===mes);

  const porCategoria = (list)=>{
    const map = {};
    list.forEach(e=>{ map[e.categoria] = (map[e.categoria]||0) + Number(e.valor||0); });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  };
  const entCatArr = porCategoria(entradasMes);
  const saiCatArr = porCategoria(saidasMes);
  const totalEnt = entCatArr.reduce((a,[,v])=>a+v,0);
  const totalSai = saiCatArr.reduce((a,[,v])=>a+v,0);

  document.getElementById('content').innerHTML = `
    <div class="grid grid-3" style="margin-bottom:20px;">
      <div class="card">
        <div class="card-icon icon-green"><svg viewBox="0 0 24 24"><path d="M4 16l6-6 4 4 6-7"/><path d="M14 7h6v6"/></svg></div>
        <div class="stat-label">Entradas — ${MESES[mes]}</div>
        <div class="stat-value" style="color:var(--green);">${formatBRL(totalEnt)}</div>
      </div>
      <div class="card">
        <div class="card-icon icon-red"><svg viewBox="0 0 24 24"><path d="M4 8l6 6 4-4 6 7"/><path d="M14 17h6v-6"/></svg></div>
        <div class="stat-label">Saídas — ${MESES[mes]}</div>
        <div class="stat-value" style="color:var(--red);">${formatBRL(totalSai)}</div>
      </div>
      <div class="card tone-total">
        <div class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M11 20V4"/><path d="M18 20v-7"/></svg></div>
        <div class="stat-label">Saldo do Mês</div>
        <div class="stat-value">${formatBRL(totalEnt-totalSai)}</div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="panel">
        <div class="panel-head"><h3>Entradas por categoria</h3></div>
        ${entCatArr.length? entCatArr.map(([cat,v])=>`
          <div class="ticket-line"><span class="lbl">${cat}</span><span class="dots"></span><span class="val pos">${formatBRL(v)}</span></div>
        `).join('') : '<div class="empty-state"><div class="ico">◇</div>Nenhuma entrada neste mês</div>'}
        ${entCatArr.length? `<div class="ticket-line ticket-total"><span class="lbl">Total</span><span class="dots"></span><span class="val pos">${formatBRL(totalEnt)}</span></div>`:''}
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Saídas por categoria</h3></div>
        ${saiCatArr.length? saiCatArr.map(([cat,v])=>`
          <div class="ticket-line"><span class="lbl">${cat}</span><span class="dots"></span><span class="val neg">${formatBRL(v)}</span></div>
        `).join('') : '<div class="empty-state"><div class="ico">◇</div>Nenhuma saída neste mês</div>'}
        ${saiCatArr.length? `<div class="ticket-line ticket-total"><span class="lbl">Total</span><span class="dots"></span><span class="val neg">${formatBRL(totalSai)}</span></div>`:''}
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3>Maiores saídas do mês</h3></div>
      <div class="chart-box small" id="boxMensal"><canvas id="canvasMensal"></canvas></div>
    </div>
  `;

  document.getElementById('selMensalAno').addEventListener('change', e=>{ state.mensalAno = Number(e.target.value); renderMensal(); });
  document.getElementById('selMensalMes').addEventListener('change', e=>{ state.mensalMes = Number(e.target.value); renderMensal(); });

  const top = saiCatArr.slice(0,8);
  if(!top.length){
    chartEmptyState('boxMensal', 'Nenhuma saída registrada neste mês.');
  } else {
    ensureChartLib().then(()=>{
      try{
        const ctx = document.getElementById('canvasMensal');
        if(!ctx) return;
        if(chartMensal) chartMensal.destroy();
        chartMensal = new Chart(ctx, {
          type:'bar',
          data:{ labels: top.map(([c])=>c), datasets:[{ data: top.map(([,v])=>v), backgroundColor:'#C97F1E', borderRadius:5, maxBarThickness:22 }] },
          options:{
            indexAxis:'y', responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false},
              tooltip:{ backgroundColor:'#1D2420', padding:10, cornerRadius:8, callbacks:{ label:(c)=> ` ${formatBRL(c.parsed.x)}` } } },
            scales:{ x:{ ticks:{ callback:(v)=>'R$ '+v.toLocaleString('pt-BR'), font:{family:'Inter'} }, grid:{color:'#EEF0EA'} }, y:{ grid:{display:false}, ticks:{font:{family:'Inter', size:12}} } }
          }
        });
        requestAnimationFrame(()=>{ try{ chartMensal && chartMensal.resize(); }catch(e){} });
      } catch(e){
        console.error('Falha ao criar gráfico mensal:', e);
        chartEmptyState('boxMensal', 'Não foi possível carregar o gráfico agora.');

function tabelaConsolidadaHTML(resumo){
  const entCats = Object.keys(resumo.entPorCat);
  const saiCats = Object.keys(resumo.saiPorCat);
  let rows = '';
  entCats.forEach(cat=>{
    const arr = resumo.entPorCat[cat];
    const soma = arr.reduce((a,b)=>a+b,0);
    if(soma===0) return;
    rows += `<tr><td>${cat}</td>${arr.map(v=>`<td class="num">${v?formatNum(v):'—'}</td>`).join('')}<td class="num" style="font-weight:700;">${formatNum(soma)}</td></tr>`;
  });
  rows += `<tr style="background:var(--green-soft);"><td style="font-weight:800;">Total Entradas</td>${resumo.totalEnt.map(v=>`<td class="num" style="font-weight:800;">${formatNum(v)}</td>`).join('')}<td class="num" style="font-weight:800;">${formatNum(resumo.totalEnt.reduce((a,b)=>a+b,0))}</td></tr>`;

  saiCats.forEach(cat=>{
    const arr = resumo.saiPorCat[cat];
    const soma = arr.reduce((a,b)=>a+b,0);
    if(soma===0) return;
    rows += `<tr><td>${cat}</td>${arr.map(v=>`<td class="num">${v?formatNum(v):'—'}</td>`).join('')}<td class="num" style="font-weight:700;">${formatNum(soma)}</td></tr>`;
  });
  rows += `<tr style="background:var(--red-soft);"><td style="font-weight:800;">Total Saídas</td>${resumo.totalSai.map(v=>`<td class="num" style="font-weight:800;">${formatNum(v)}</td>`).join('')}<td class="num" style="font-weight:800;">${formatNum(resumo.totalSai.reduce((a,b)=>a+b,0))}</td></tr>`;

  const saldoMes = resumo.totalEnt.map((v,i)=>v-resumo.totalSai[i]);
  rows += `<tr style="background:var(--ink); color:#fff;"><td style="font-weight:800;">Saldo do Mês</td>${saldoMes.map(v=>`<td class="num" style="font-weight:800; color:#fff;">${formatNum(v)}</td>`).join('')}<td class="num" style="font-weight:800; color:#fff;">${formatNum(saldoMes.reduce((a,b)=>a+b,0))}</td></tr>`;

  return `<table class="data"><thead><tr><th>Categoria</th>${MESES_ABBR.map(m=>`<th style="text-align:right;">${m}</th>`).join('')}<th style="text-align:right;">Total</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ================= CÁLCULOS AGREGADOS ================= */
function entryYear(e){ return parseInt(e.data.slice(0,4)); }
function entryMonth(e){ return parseInt(e.data.slice(5,7)) - 1; }
function entryDay(e){ return e.data; }

function saldosPorConta(){
  const saldo = {};
  state.contas.forEach(c=> saldo[c.id] = 0);
  state.entries.forEach(e=>{
    const v = Number(e.valor)||0;
    if(e.movimento==='entrada') saldo[e.conta] = (saldo[e.conta]||0) + v;
    else if(e.movimento==='saida') saldo[e.conta] = (saldo[e.conta]||0) - v;
    else if(e.movimento==='transferencia'){
      saldo[e.contaOrigem] = (saldo[e.contaOrigem]||0) - v;
      saldo[e.contaDestino] = (saldo[e.contaDestino]||0) + v;
    }
  });
  return saldo;
}

function totalGeral(saldo){ return Object.values(saldo).reduce((a,b)=>a+(b||0),0); }

function anosDisponiveis(){
  const anos = new Set(state.entries.map(entryYear));
  anos.add(new Date().getFullYear());
  return Array.from(anos).sort();
}

function resumoAnual(ano){
  // returns {entradasPorCatPorMes, saidasPorCatPorMes, totalEntradasMes[12], totalSaidasMes[12]}
  const entCats = state.categorias.entradas;
  const saiCats = state.categorias.saidas;
  const entPorCat = {}; entCats.forEach(c=> entPorCat[c] = new Array(12).fill(0));
  const saiPorCat = {}; saiCats.forEach(c=> saiPorCat[c] = new Array(12).fill(0));
  const totalEnt = new Array(12).fill(0);
  const totalSai = new Array(12).fill(0);

  state.entries.forEach(e=>{
    if(entryYear(e) !== ano) return;
    const m = entryMonth(e);
    const v = Number(e.valor)||0;
    if(e.movimento==='entrada'){
      if(!entPorCat[e.categoria]) entPorCat[e.categoria] = new Array(12).fill(0);
      entPorCat[e.categoria][m] += v;
      totalEnt[m] += v;
    } else if(e.movimento==='saida'){
      if(!saiPorCat[e.categoria]) saiPorCat[e.categoria] = new Array(12).fill(0);
      saiPorCat[e.categoria][m] += v;
      totalSai[m] += v;
    }
  });

  return { entPorCat, saiPorCat, totalEnt, totalSai };
}

function contagemVendas({dia, mes, ano}){
  // conta lançamentos de entrada cuja categoria começa com "Vendas"
  return state.entries.filter(e=>{
    if(e.movimento!=='entrada') return false;
    if(!e.categoria || !e.categoria.startsWith('Vendas')) return false;
    if(dia && e.data !== dia) return false;
    if(mes!==undefined && mes!==null && mes!=='' ){
      if(entryMonth(e) !== Number(mes)) return false;
    }
    if(ano && entryYear(e) !== Number(ano)) return false;
    return true;
  }).length;
